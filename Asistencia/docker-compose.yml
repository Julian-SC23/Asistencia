services:
  mysql:
    image: mysql:latest
    container_name: mysql-asistencia
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: asistencia_escolar
      MYSQL_USER: juliansini
      MYSQL_PASSWORD: julian
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --bind-address=0.0.0.0
    networks:
      - mysql_network
volumes:
  mysql_data:
    driver: local
networks:
  mysql_network:
    driver: bridge